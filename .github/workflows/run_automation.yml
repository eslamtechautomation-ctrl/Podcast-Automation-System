name: Podcast Automation Update

on:
  schedule:
    - cron: '0 */6 * * *' # يعمل تلقائياً كل 6 ساعات لفحص المدونة
  workflow_dispatch:      # زر تشغيل يدوي للتجربة في أي وقت

jobs:
  build:
    runs-on: ubuntu-latest
    
    # تصاريح الكتابة للمستودع (مهمة جداً لرفع ملف الـ RSS والصوت)
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Automation Script
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add podcast.xml audio/*.mp3
          # سنتحقق إذا كان هناك تغييرات فعلاً قبل عمل commit لتجنب الأخطاء
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Podcast: New Episode Added" && git push)
